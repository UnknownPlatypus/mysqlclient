name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - "doc/**"
      - "README.md"
  release:
    types: [published]

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-13]

    env:
      CIBW_TEST_COMMAND: "pytest {project}/tests"
      CIBW_BUILD: "cp311-* cp312-* cp313-*"
      CIBW_SKIP: "*-win* *_i686 *_s390x *_ppc64le pp*"
      CIBW_ARCHS_MACOS: "x86_64 arm64"
      CIBW_ARCHS_LINUX: "x86_64 aarch64"
      CIBW_TEST_SKIP: "*"
      CIBW_ENVIRONMENT: "CFLAGS=-g0"
      CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
      CIBW_MANYLINUX_AARCH64_IMAGE: "manylinux_2_28"
      CIBW_ENVIRONMENT_MACOS: "MYSQLCLIENT_LDFLAGS=\"-L/usr/local/opt/mysql-client@8.0/lib\" MYSQLCLIENT_CFLAGS=\"-I/usr/local/opt/mysql-client@8.0/include/mysql\" PATH=\"/usr/local/opt/mysql@8.0/bin:/usr/local/opt/mysql-client@8.0/bin:$PATH\""
      CIBW_BEFORE_ALL_MACOS: "brew install mysql-client@8.0"
      CIBW_BEFORE_ALL_LINUX: "yum install -y python3-devel mysql-devel pkgconfig || (apt-get update && apt-get install -y default-libmysqlclient-dev) || (apk add --no-cache pkgconf build-base mariadb-dev)"

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v1
        with:
          platforms: all

      - name: Build & Test Wheels
        uses: pypa/cibuildwheel@v2.22.0

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build Source Distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build source distribution
        run: python setup.py sdist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-sdist
          path: dist/*.tar.gz
